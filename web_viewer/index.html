<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Reconstruction Viewer</title>
    <meta name="description" content="Interactive 3D point cloud viewer for stereo reconstruction results">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="viewer-canvas"></canvas>

    <!-- Header -->
    <header id="header">
        <div class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <h1>3D Reconstruction Viewer</h1>
        </div>
        <div class="stats" id="stats">
            <span id="point-count">0 points</span>
            <span class="divider">|</span>
            <span id="fps-counter">0 FPS</span>
        </div>
    </header>

    <!-- Control Panel -->
    <div id="control-panel">
        <div class="panel-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
            <span>Controls</span>
        </div>

        <div class="control-group">
            <label for="file-input">Load PLY File</label>
            <div class="file-drop" id="file-drop">
                <input type="file" id="file-input" accept=".ply">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span>Click or drag PLY file here</span>
            </div>
        </div>

        <div class="control-group">
            <label for="point-size">Point Size: <span id="size-value">2.0</span></label>
            <input type="range" id="point-size" min="0.5" max="8" step="0.1" value="2.0">
        </div>

        <div class="control-group">
            <label>Background</label>
            <div class="btn-group">
                <button class="btn active" data-bg="dark">Dark</button>
                <button class="btn" data-bg="light">Light</button>
                <button class="btn" data-bg="gradient">Gradient</button>
            </div>
        </div>

        <div class="control-group">
            <label>View</label>
            <div class="btn-group">
                <button class="btn" id="btn-front">Front</button>
                <button class="btn" id="btn-top">Top</button>
                <button class="btn" id="btn-side">Side</button>
                <button class="btn" id="btn-reset">Reset</button>
            </div>
        </div>

        <div class="control-group">
            <label>Actions</label>
            <button class="btn btn-full" id="btn-screenshot">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                Screenshot
            </button>
            <button class="btn btn-full" id="btn-auto-rotate">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
                </svg>
                Auto Rotate
            </button>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Loading point cloud...</p>
    </div>

    <!-- Instructions -->
    <div id="instructions">
        <p>🖱️ Left drag: rotate &nbsp;|&nbsp; 🖱️ Right drag: pan &nbsp;|&nbsp; 🔲 Scroll: zoom</p>
    </div>

    <!--
        Three.js loaded as classic (non-module) scripts to work with file:// protocol.
        Import maps / ES modules are blocked by CORS on file:// origins.
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/PLYLoader.js"></script>

    <script>
    // ═══════════════════════════════════════════════════════════
    // 3D Reconstruction Viewer — Inlined for file:// compatibility
    // ═══════════════════════════════════════════════════════════
    (function () {
        "use strict";

        // ─── State ───
        let scene, camera, renderer, controls, pointCloud;
        let autoRotate = false;
        let frameCount = 0;
        let lastFpsTime = performance.now();

        // ─── DOM ───
        const canvas = document.getElementById("viewer-canvas");
        const loading = document.getElementById("loading");
        const pointCountEl = document.getElementById("point-count");
        const fpsCounterEl = document.getElementById("fps-counter");
        const pointSizeSlider = document.getElementById("point-size");
        const sizeValueEl = document.getElementById("size-value");
        const fileDrop = document.getElementById("file-drop");
        const fileInput = document.getElementById("file-input");

        // ─── Init Scene ───
        function init() {
            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                antialias: true,
                alpha: true,
                preserveDrawingBuffer: true,
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x0a0a0f, 1);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(
                60, window.innerWidth / window.innerHeight, 0.1, 10000
            );
            camera.position.set(0, 0, 5);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.rotateSpeed = 0.8;
            controls.zoomSpeed = 1.2;
            controls.panSpeed = 0.8;
            controls.minDistance = 0.1;
            controls.maxDistance = 1000;

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            var grid = new THREE.GridHelper(10, 20, 0x222240, 0x15152a);
            grid.material.opacity = 0.3;
            grid.material.transparent = true;
            scene.add(grid);

            scene.add(new THREE.AxesHelper(1));

            window.addEventListener("resize", onResize);
            setupControls();
            animate();
            console.log("3D Reconstruction Viewer initialized");
        }

        // ─── Animation Loop ───
        function animate() {
            requestAnimationFrame(animate);
            if (autoRotate && pointCloud) {
                pointCloud.rotation.y += 0.003;
            }
            controls.update();
            renderer.render(scene, camera);

            frameCount++;
            var now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fpsCounterEl.textContent = frameCount + " FPS";
                frameCount = 0;
                lastFpsTime = now;
            }
        }

        // ─── Load PLY ───
        function loadPLY(source) {
            loading.classList.remove("hidden");
            var loader = new THREE.PLYLoader();

            function onLoad(geometry) {
                if (pointCloud) {
                    scene.remove(pointCloud);
                    pointCloud.geometry.dispose();
                    pointCloud.material.dispose();
                }

                geometry.computeBoundingBox();
                geometry.computeBoundingSphere();

                var center = new THREE.Vector3();
                geometry.boundingBox.getCenter(center);
                geometry.translate(-center.x, -center.y, -center.z);

                var radius = geometry.boundingSphere.radius || 1;
                var scale = 3 / radius;
                geometry.scale(scale, scale, scale);

                var hasColors = geometry.hasAttribute("color");
                var material = new THREE.PointsMaterial({
                    size: parseFloat(pointSizeSlider.value) * 0.01,
                    vertexColors: hasColors,
                    color: hasColors ? 0xffffff : 0x6c5ce7,
                    sizeAttenuation: true,
                    transparent: true,
                    opacity: 0.9,
                });

                pointCloud = new THREE.Points(geometry, material);
                scene.add(pointCloud);

                var count = geometry.attributes.position.count;
                pointCountEl.textContent = count.toLocaleString() + " points";

                camera.position.set(0, 1, 4);
                controls.target.set(0, 0, 0);
                controls.update();

                loading.classList.add("hidden");
                console.log("Loaded " + count + " points");
            }

            function onError(err) {
                console.error("Error loading PLY:", err);
                loading.classList.add("hidden");
                alert("Failed to load PLY file. Check the console for details.");
            }

            if (source instanceof ArrayBuffer) {
                try {
                    var geometry = loader.parse(source);
                    onLoad(geometry);
                } catch (e) {
                    onError(e);
                }
            } else {
                loader.load(source, onLoad, undefined, onError);
            }
        }

        // ─── File Input & Controls ───
        function setupControls() {
            // File drop zone click → trigger file picker
            fileDrop.addEventListener("click", function (e) {
                if (e.target === fileInput) return;
                fileInput.click();
            });

            // Drag over
            fileDrop.addEventListener("dragover", function (e) {
                e.preventDefault();
                e.stopPropagation();
                fileDrop.classList.add("drag-over");
            });

            // Drag leave
            fileDrop.addEventListener("dragleave", function (e) {
                e.preventDefault();
                e.stopPropagation();
                fileDrop.classList.remove("drag-over");
            });

            // Drop
            fileDrop.addEventListener("drop", function (e) {
                e.preventDefault();
                e.stopPropagation();
                fileDrop.classList.remove("drag-over");
                var file = e.dataTransfer.files[0];
                if (file && file.name.toLowerCase().endsWith(".ply")) {
                    console.log("Dropped file:", file.name, file.size, "bytes");
                    readFile(file);
                } else {
                    alert("Please drop a .ply file");
                }
            });

            // File input change
            fileInput.addEventListener("change", function (e) {
                var file = e.target.files[0];
                if (file) {
                    console.log("Selected file:", file.name, file.size, "bytes");
                    readFile(file);
                }
            });

            // Point size slider
            pointSizeSlider.addEventListener("input", function (e) {
                var val = parseFloat(e.target.value);
                sizeValueEl.textContent = val.toFixed(1);
                if (pointCloud) {
                    pointCloud.material.size = val * 0.01;
                    pointCloud.material.needsUpdate = true;
                }
            });

            // Background buttons
            document.querySelectorAll("[data-bg]").forEach(function (btn) {
                btn.addEventListener("click", function () {
                    document.querySelectorAll("[data-bg]").forEach(function (b) {
                        b.classList.remove("active");
                    });
                    btn.classList.add("active");
                    var bg = btn.dataset.bg;
                    if (bg === "dark") renderer.setClearColor(0x0a0a0f, 1);
                    else if (bg === "light") renderer.setClearColor(0xe8e8f0, 1);
                    else renderer.setClearColor(0x1a1a2e, 1);
                });
            });

            // View buttons
            document.getElementById("btn-front").addEventListener("click", function () {
                camera.position.set(0, 0, 5);
                controls.target.set(0, 0, 0);
                controls.update();
            });
            document.getElementById("btn-top").addEventListener("click", function () {
                camera.position.set(0, 5, 0.01);
                controls.target.set(0, 0, 0);
                controls.update();
            });
            document.getElementById("btn-side").addEventListener("click", function () {
                camera.position.set(5, 0, 0);
                controls.target.set(0, 0, 0);
                controls.update();
            });
            document.getElementById("btn-reset").addEventListener("click", function () {
                camera.position.set(0, 1, 4);
                controls.target.set(0, 0, 0);
                if (pointCloud) pointCloud.rotation.set(0, 0, 0);
                controls.update();
            });

            // Screenshot
            document.getElementById("btn-screenshot").addEventListener("click", function () {
                renderer.render(scene, camera);
                var link = document.createElement("a");
                link.download = "reconstruction_screenshot.png";
                link.href = canvas.toDataURL("image/png");
                link.click();
            });

            // Auto rotate
            var rotateBtn = document.getElementById("btn-auto-rotate");
            rotateBtn.addEventListener("click", function () {
                autoRotate = !autoRotate;
                if (autoRotate) {
                    rotateBtn.classList.add("active");
                } else {
                    rotateBtn.classList.remove("active");
                }
            });
        }

        function readFile(file) {
            loading.classList.remove("hidden");
            var reader = new FileReader();
            reader.onload = function (e) {
                console.log("File read complete, loading into Three.js...");
                loadPLY(e.target.result);
            };
            reader.onerror = function () {
                console.error("FileReader error");
                loading.classList.add("hidden");
            };
            reader.readAsArrayBuffer(file);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ─── Start ───
        init();
    })();
    </script>
</body>
</html>
